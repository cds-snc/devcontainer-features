name: Shellcheck
on:
  push:
    paths:
      - "**/*.sh"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Shellcheck
      run: |
        .github/workflows/scripts/run-shellcheck.sh


